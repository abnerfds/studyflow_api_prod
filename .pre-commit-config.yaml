# =============================================================================
# .pre-commit-config.yaml
# =============================================================================
# Configuração do pre-commit: executa as MESMAS verificações do CI localmente,
# ANTES de cada commit. Isso cria uma "primeira linha de defesa" que impede
# que código com problemas sequer chegue ao repositório remoto.
#
# Filosofia "Shift Left": mova a detecção de erros para o mais cedo possível
# no ciclo de desenvolvimento (IDE → commit → CI → deploy).
#
# Sincronizado com: .github/workflows/ci.yml
#
# Setup (uma vez por desenvolvedor):
#   pip install pre-commit
#   pre-commit install        # instala os hooks no .git/hooks/
#   pre-commit run --all-files # executa em todos os arquivos (validação inicial)
# =============================================================================

# Versão padrão do repositório base do pre-commit
default_language_version:
  python: python3.11

repos:
  # ---------------------------------------------------------------------------
  # Hooks Básicos de Qualidade de Arquivo
  # ---------------------------------------------------------------------------
  # Verificações rápidas que não requerem instalação de dependências pesadas.
  # Excelentes para pegar errinhos estruturais antes de rodar os linters maiores.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Impede commits de arquivos que contêm chaves de API, senhas, etc. (Segurança básica)
      - id: detect-private-key

      # Remove espaços em branco ao final das linhas. (Mantém o diff do git limpo)
      - id: trailing-whitespace

      # Garante que todos os arquivos terminam com uma linha em branco (Padrão POSIX).
      - id: end-of-file-fixer

      # Valida a sintaxe de arquivos YAML (ci.yml, docker-compose.yml, etc.).
      - id: check-yaml

      # Valida a sintaxe de arquivos TOML (pyproject.toml).
      - id: check-toml

      # Impede commits direto na branch main (força o uso de Pull Requests).
      - id: no-commit-to-branch
        args: [--branch, main]

  # ---------------------------------------------------------------------------
  # Ruff — Linter, Formatter & SAST (Segurança)
  # ---------------------------------------------------------------------------
  # Sincronizado com `ruff check` e `ruff format --check` do CI.
  # O Ruff centraliza as funções do Black, isort, Flake8 e do Bandit (via regras "S").
  #
  # Vantagem do pre-commit: Ele CORRIGE automaticamente os problemas (auto-fix),
  # ao contrário do CI, que apenas reporta a falha. Após a correção pelo Ruff,
  # o pre-commit falhará intencionalmente para que você possa revisar a mudança,
  # fazer um `git add` no arquivo corrigido e commitar novamente.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Equivalente a `ruff check --fix` — corrige violações de lint, isort e segurança.
      - id: ruff
        args: [--fix]

      # Equivalente a `ruff format` — aplica formatação estilo Black.
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy — Verificação de Tipos Estáticos
  # ---------------------------------------------------------------------------
  # Sincronizado com `mypy . --config-file pyproject.toml` do CI.
  # NOTA: O Mypy costuma ser a etapa mais lenta do pre-commit (~5-15s).
  #
  # A configuração `additional_dependencies` é CRUCIAL aqui. Como o pre-commit
  # roda os hooks em ambientes virtuais isolados, o Mypy não teria acesso às
  # bibliotecas do seu projeto para inspecionar as tipagens (stubs) delas.
  # Mantenha esta lista sempre sincronizada com as libs principais do seu projeto.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # Passa a configuração centralizada do pyproject.toml.
        args: [--config-file, pyproject.toml]
        # Dependências necessárias para o Mypy entender os tipos de terceiros.
        additional_dependencies:
          - "fastapi>=0.135.0"
          - "pydantic>=2.0.0"
          - "pydantic-settings>=2.0.0"
          - "sqlalchemy>=2.0.0"
          - "pytest>=9.0.0"
          - "prometheus-fastapi-instrumentator"
          - "alembic"
