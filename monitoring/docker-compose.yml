services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      # Injeta o nosso arquivo de configuração local para dentro da pasta padrão do container
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      # Libera a permissão de rede para o container enxergar o IP do seu computador/WSL
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Sobrescreve a variável de ambiente nativa para definir a senha inicial de administrador
      - GF_SECURITY_ADMIN_PASSWORD=admin

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      # Injeta as regras de leitura que acabamos de criar
      - ./promtail.yml:/etc/promtail/promtail.yml
      # Mapeia o log gerado na raiz do seu projeto no WSL para a pasta de leitura do container
      - ../app.log:/var/log/app.log
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      # Garante que o carteiro só comece a trabalhar depois que a agência (Loki) estiver aberta
      - loki
