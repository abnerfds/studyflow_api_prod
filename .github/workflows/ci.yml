# =============================================================================
# CI Pipeline
# =============================================================================
# Arquitetura: 2 jobs independentes rodando em PARALELO.
#
# Fail-Fast Strategy:
#   - Cada job é autônomo. Todos iniciam ao mesmo tempo, maximizando a
#     eficiência de tempo de execução.
#   - `concurrency.cancel-in-progress: true` garante que um novo push
#     cancela a run anterior do mesmo branch, evitando desperdício de runners.
#   - O PR/push só é aprovado se TODOS os jobs passarem (status checks
#     obrigatórios configurados nas Branch Protection Rules do repositório).
#
# Triggers:
#   - push para `main`: valida o código após merge.
#   - pull_request (qualquer branch): valida antes do merge (gate de qualidade).
# =============================================================================

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

# Cancela runs em progresso do mesmo branch/PR ao receber um novo push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Linter, Formatter & Security — Ruff
  # ---------------------------------------------------------------------------
  # Ruff substitui simultaneamente: Black (formatter) + isort (import sorter)
  # + Flake8 (linter) + Bandit (SAST/Security via regras "S").
  # Uma única ferramenta, escrita em Rust, incrivelmente rápida.
  # ---------------------------------------------------------------------------
  lint:
    name: "Linter, Formatter & Security (Ruff)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar Ruff
        run: pip install ruff

      - name: "ruff check — Análise de código, imports e segurança (SAST)"
        run: ruff check .

      - name: "ruff format --check — Verificação de formatação (estilo Black)"
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # JOB 2: Static Type Checking — Mypy
  # ---------------------------------------------------------------------------
  # Mypy em modo estrito (`--strict`) habilita todas as verificações de tipo.
  # Instalamos o requirements.txt completo para que o Mypy possa inspecionar
  # os stubs de tipo das bibliotecas (FastAPI, Pydantic, SQLAlchemy).
  # ---------------------------------------------------------------------------
  type-check:
    name: "Static Type Checking (Mypy)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências do projeto + Mypy
        run: pip install -r requirements.txt mypy

      - name: "mypy — Verificação de tipos estáticos (modo estrito)"
        run: mypy . --config-file pyproject.toml

  # ---------------------------------------------------------------------------
  # JOB 3: Testes Automatizados — Pytest
  # ---------------------------------------------------------------------------
  # Executa a suíte de testes unitários e de integração.
  # Garante que a lógica de negócio e os endpoints continuam funcionando.
  # ---------------------------------------------------------------------------
  test:
    name: "Unit & Integration Tests (Pytest)"
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost:5432/dummy"

    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar todas as dependências (App + Testes)
        # 👇 MUDANÇA AQUI: Apontamos para o arquivo de testes unificado
        run: pip install -r requirements-test.txt

      - name: "pytest — Executar testes (Docker já está embutido no Runner)"
        run: pytest -v --cov=. --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # JOB 4: Validação do Container — Docker Build
  # ---------------------------------------------------------------------------
  # Tenta construir a imagem Docker da API. Se quebrar aqui, significa que
  # o Dockerfile está inválido ou faltam dependências no nível do SO.
  # ---------------------------------------------------------------------------
  docker-check:
    name: "Docker Build Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v4

      - name: "Docker Build — Validar montagem da imagem"
        # Tenta "buildar" a imagem usando o Dockerfile da raiz.
        # Não faz o push, apenas verifica se compila com sucesso.
        run: docker build -t studyflow-api:test .
